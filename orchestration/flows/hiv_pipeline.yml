id: hiv_pipeline
namespace: hiv.resistance

tasks:
  - id: debug_ls
    type: io.kestra.plugin.scripts.python.Commands
    runner: PROCESS
    commands:
      - ls -la /app/project/
      - ls -la /app/project/ingestion/
      
  - id: ingest_hivdb
    type: io.kestra.plugin.scripts.python.Commands
    runner: PROCESS
    commands:
      - pip install dlt duckdb requests
      - cd /app/project && python ingestion/dlt-HIVDB.py

  - id: upload_to_s3
    type: io.kestra.plugin.scripts.python.Commands
    runner: PROCESS
    commands:
      - pip install duckdb boto3
      - cd /app/project && python ingestion/S3-ingestion.py